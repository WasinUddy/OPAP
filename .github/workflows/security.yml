name: Dependency and license security

on:
  push:
    branches: [main]
    paths:
      - "**/Cargo.lock"
      - "**/Cargo.toml"
      - "rust-toolchain.toml"
      - "apps/desktop/package.json"
      - "apps/desktop/pnpm-lock.yaml"
      - "apps/desktop/pnpm-workspace.yaml"
      - "apps/desktop/package-lock.json"
      - ".github/deny.toml"
      - ".github/scripts/check-js-licenses.mjs"
      - ".github/scripts/generate-third-party-licenses.mjs"
      - ".github/scripts/license-supplements/**"
      - ".github/scripts/prepare-third-party-node-dependencies.mjs"
      - ".github/scripts/test-tauri-legal-resources.mjs"
      - ".github/scripts/verify-license-supplement-sources.mjs"
      - ".github/scripts/tests/**"
      - ".github/scripts/third-party-targets.json"
      - "apps/desktop/src-tauri/tauri.conf.json"
      - "THIRD_PARTY_LICENSES.txt"
      - ".github/workflows/security.yml"
  pull_request:
    paths:
      - "**/Cargo.lock"
      - "**/Cargo.toml"
      - "rust-toolchain.toml"
      - "apps/desktop/package.json"
      - "apps/desktop/pnpm-lock.yaml"
      - "apps/desktop/pnpm-workspace.yaml"
      - "apps/desktop/package-lock.json"
      - ".github/deny.toml"
      - ".github/scripts/check-js-licenses.mjs"
      - ".github/scripts/generate-third-party-licenses.mjs"
      - ".github/scripts/license-supplements/**"
      - ".github/scripts/prepare-third-party-node-dependencies.mjs"
      - ".github/scripts/test-tauri-legal-resources.mjs"
      - ".github/scripts/verify-license-supplement-sources.mjs"
      - ".github/scripts/tests/**"
      - ".github/scripts/third-party-targets.json"
      - "apps/desktop/src-tauri/tauri.conf.json"
      - "THIRD_PARTY_LICENSES.txt"
      - ".github/workflows/security.yml"
  schedule:
    - cron: "17 2 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust-dependencies:
    name: Rust dependencies (${{ matrix.name }})
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: core workspace
            manifest: Cargo.toml
            arguments: --all-features --locked
          - name: Cucumber acceptance
            manifest: tests/acceptance/Cargo.toml
            arguments: --all-features --locked
          - name: OSCAR compatibility harness
            manifest: compat/Cargo.toml
            arguments: --all-features --locked
          - name: desktop native host
            manifest: apps/desktop/src-tauri/Cargo.toml
            # The shipped host is macOS-only today. Filtering prevents Linux-only
            # GTK3/unic/proc-macro maintenance notices from masking real findings.
            arguments: --all-features --locked --target x86_64-apple-darwin
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Audit Rust dependencies
        uses: EmbarkStudios/cargo-deny-action@6c8f9facfa5047ec02d8485b6bf52b587b7777d1 # v2.0.18
        with:
          rust-version: 1.97.1
          manifest-path: ${{ matrix.manifest }}
          arguments: ${{ matrix.arguments }}
          command: check
          command-arguments: --config .github/deny.toml

  frontend-dependencies:
    name: Frontend advisories and licenses
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Detect frontend package manager
        id: frontend
        shell: bash
        run: |
          if [[ ! -f apps/desktop/package.json ]]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No apps/desktop package yet; frontend audit is a no-op."
            exit 0
          fi

          echo "present=true" >> "$GITHUB_OUTPUT"
          if [[ -f apps/desktop/pnpm-lock.yaml ]]; then
            echo "manager=pnpm" >> "$GITHUB_OUTPUT"
            echo "lockfile=apps/desktop/pnpm-lock.yaml" >> "$GITHUB_OUTPUT"
          elif [[ -f apps/desktop/package-lock.json ]]; then
            echo "manager=npm" >> "$GITHUB_OUTPUT"
            echo "lockfile=apps/desktop/package-lock.json" >> "$GITHUB_OUTPUT"
          else
            echo "::error::apps/desktop must commit pnpm-lock.yaml or package-lock.json"
            exit 1
          fi

      - name: Install pnpm
        if: steps.frontend.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: apps/desktop/package.json
          run_install: false

      - name: Install Node.js
        if: steps.frontend.outputs.present == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.17.1
          cache: ${{ steps.frontend.outputs.manager }}
          cache-dependency-path: ${{ steps.frontend.outputs.lockfile }}

      - name: Install dependencies without lifecycle scripts
        if: steps.frontend.outputs.present == 'true'
        shell: bash
        run: |
          if [[ "${{ steps.frontend.outputs.manager }}" == "pnpm" ]]; then
            pnpm --dir apps/desktop install --frozen-lockfile --ignore-scripts
          else
            npm --prefix apps/desktop ci --ignore-scripts
          fi

      - name: Audit known vulnerabilities
        if: steps.frontend.outputs.present == 'true'
        shell: bash
        run: |
          if [[ "${{ steps.frontend.outputs.manager }}" == "pnpm" ]]; then
            pnpm --dir apps/desktop audit --audit-level high
          else
            npm --prefix apps/desktop audit --audit-level=high
          fi

      - name: Check dependency licenses
        if: steps.frontend.outputs.present == 'true'
        shell: bash
        run: |
          if [[ "${{ steps.frontend.outputs.manager }}" == "pnpm" ]]; then
            pnpm --dir apps/desktop licenses list --json \
              | node .github/scripts/check-js-licenses.mjs --pnpm-json
          else
            node .github/scripts/check-js-licenses.mjs apps/desktop/node_modules
          fi

  dependency-review:
    name: Pull request dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Review dependency changes
        uses: actions/dependency-review-action@da24556b548a50705dd671f47852072ea4c105d9 # v4.7.1
        with:
          fail-on-severity: high
          license-check: true
          allow-licenses: >-
            0BSD, Apache-2.0, Apache-2.0 WITH LLVM-exception, BSD-2-Clause,
            BSD-3-Clause, BlueOak-1.0.0, CC-BY-4.0, CC0-1.0, GPL-3.0-only,
            GPL-3.0-or-later, ISC, LGPL-2.1-only, LGPL-2.1-or-later,
            LGPL-3.0-only, LGPL-3.0-or-later, MIT, MIT-0, MPL-2.0,
            Unicode-3.0, Unicode-DFS-2016, Unlicense, Zlib
